<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena de Éter - Card Game</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --secondary: #ec4899;
            --energy-color: #3b82f6;
            --hp-color: #ef4444;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Telas */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
            z-index: 100;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Menu Inicial */
        .menu-content {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .btn-start {
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .btn-start:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.6);
            background: #818cf8;
        }

        /* Contagem Regressiva */
        #countdown-text {
            font-size: 8rem;
            font-weight: bold;
            color: var(--secondary);
            text-shadow: 0 0 30px var(--secondary);
        }

        /* Arena de Batalha */
        .arena {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 1fr auto 1.2fr;
            padding: 20px;
            gap: 20px;
        }

        /* HUDs */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stats-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .hp-bar { background: var(--hp-color); box-shadow: 0 0 10px var(--hp-color); }
        .energy-bar { background: var(--energy-color); box-shadow: 0 0 10px var(--energy-color); }

        .label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Cartas */
        .hand {
            display: flex;
            justify-content: center;
            gap: 20px;
            perspective: 1000px;
        }

        .card {
            width: 180px;
            height: 260px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover:not(.disabled) {
            transform: translateY(-20px) rotateX(10deg);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .card-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .card-name {
            font-weight: bold;
            font-size: 1rem;
            color: var(--primary);
        }

        .card-cost {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--energy-color);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .stat-item svg {
            width: 16px;
            height: 16px;
        }

        /* Feed de Efeitos */
        #game-feed {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 50;
            text-align: center;
        }

        .damage-popup {
            font-size: 2rem;
            font-weight: bold;
            color: var(--hp-color);
            animation: floatUp 1s forwards;
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .enemy-play {
            animation: enemyPlayAnim 0.6s ease-in-out;
        }

        @keyframes enemyPlayAnim {
            0% { transform: translateY(-50px); opacity: 0; }
            50% { transform: translateY(20px); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .hand { gap: 10px; }
            .card { width: 110px; height: 180px; padding: 8px; }
            .card-name { font-size: 0.7rem; }
            .stat-item { font-size: 0.6rem; gap: 4px; }
            .stat-item svg { width: 12px; height: 12px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Tela Inicial -->
    <div id="screen-menu" class="screen">
        <div class="menu-content">
            <h1>Arena de Éter</h1>
            <button class="btn-start" onclick="startCountdown()">INICIAR BATALHA</button>
        </div>
    </div>

    <!-- Tela Contagem -->
    <div id="screen-countdown" class="screen hidden">
        <div id="countdown-text">3</div>
    </div>

    <!-- Tela de Game Over -->
    <div id="screen-over" class="screen hidden">
        <div class="menu-content">
            <h1 id="over-title">VITÓRIA!</h1>
            <button class="btn-start" onclick="location.reload()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <!-- Arena de Batalha -->
    <main id="screen-battle" class="arena hidden">
        <!-- Inimigo -->
        <div class="hud enemy-hud">
            <div class="stats-group">
                <div class="label"><span>Inimigo</span><span id="enemy-hp-text">100/100</span></div>
                <div class="bar-container"><div id="enemy-hp-bar" class="bar-fill hp-bar" style="width: 100%;"></div></div>
                <div class="label"><span>Energia</span><span id="enemy-energy-text">0</span></div>
                <div class="bar-container"><div id="enemy-energy-bar" class="bar-fill energy-bar" style="width: 0%;"></div></div>
            </div>
            <div id="enemy-action" style="font-style: italic; color: #94a3b8;">Aguardando...</div>
        </div>

        <div id="game-feed"></div>

        <!-- Jogador -->
        <div class="player-area">
            <div class="hud player-hud" style="margin-bottom: 20px;">
                <div class="stats-group">
                    <div class="label"><span>Você</span><span id="player-hp-text">100/100</span></div>
                    <div class="bar-container"><div id="player-hp-bar" class="bar-fill hp-bar" style="width: 100%;"></div></div>
                    <div class="label"><span>Sua Energia</span><span id="player-energy-text">0</span></div>
                    <div class="bar-container"><div id="player-energy-bar" class="bar-fill energy-bar" style="width: 0%;"></div></div>
                </div>
            </div>

            <div class="hand" id="player-hand">
                <!-- Cartas serão geradas aqui -->
            </div>
        </div>
    </main>

    <script>
        // Ícones SVG
        const ICONS = {
            power: `<svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
            health: `<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
            attack: `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><path d="M14.5 2L12 4.5m0 0L9.5 2M12 4.5V12m0 0l-5 5m5-5l5 5"/></svg>`,
            defense: `<svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`
        };

        // Banco de Cartas (10 cartas totais)
        const DECK = [
            { name: "Titã de Ferro", pwr: 2, hp: 120, atk: 5, def: 15, cost: 4 },
            { name: "Sombra Letal", pwr: 8, hp: 40, atk: 25, def: 2, cost: 5 },
            { name: "Mago Arcano", pwr: 10, hp: 60, atk: 15, def: 5, cost: 6 },
            { name: "Escudeiro", pwr: 2, hp: 80, atk: 5, def: 8, cost: 2 },
            { name: "Dragão Rubro", pwr: 12, hp: 150, atk: 30, def: 20, cost: 9 },
            { name: "Ninja Veloz", pwr: 6, hp: 50, atk: 18, def: 4, cost: 3 },
            { name: "Golem de Pedra", pwr: 1, hp: 200, atk: 2, def: 30, cost: 7 },
            { name: "Arqueiro Real", pwr: 5, hp: 55, atk: 12, def: 3, cost: 3 },
            { name: "Berserker", pwr: 9, hp: 90, atk: 20, def: 1, cost: 5 },
            { name: "Aprendiz", pwr: 1, hp: 30, atk: 3, def: 2, cost: 1 }
        ];

        // Estado do Jogo
        let gameState = {
            player: { hp: 100, maxHp: 100, energy: 0, hand: [] },
            enemy: { hp: 100, maxHp: 100, energy: 0 },
            isPlaying: false
        };

        function startCountdown() {
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-countdown').classList.remove('hidden');
            
            let count = 3;
            const timer = setInterval(() => {
                count--;
                if(count === 0) {
                    clearInterval(timer);
                    initGame();
                } else {
                    document.getElementById('countdown-text').innerText = count;
                }
            }, 1000);
        }

        function initGame() {
            document.getElementById('screen-countdown').classList.add('hidden');
            document.getElementById('screen-battle').classList.remove('hidden');
            
            gameState.isPlaying = true;
            
            // Inicializa mão do jogador
            for(let i=0; i<3; i++) {
                gameState.player.hand.push(getRandomCard());
            }
            
            renderHand();
            startGameLoops();
        }

        function getRandomCard() {
            return DECK[Math.floor(Math.random() * DECK.length)];
        }

        function startGameLoops() {
            // Loop de Energia (1 por segundo)
            setInterval(() => {
                if(!gameState.isPlaying) return;
                
                if(gameState.player.energy < 10) gameState.player.energy++;
                if(gameState.enemy.energy < 10) gameState.enemy.energy++;
                
                updateUI();
                checkEnemyAI();
            }, 1000);
        }

        function updateUI() {
            // Barras e Textos
            document.getElementById('player-hp-bar').style.width = (gameState.player.hp / gameState.player.maxHp * 100) + "%";
            document.getElementById('player-hp-text').innerText = `${Math.ceil(gameState.player.hp)}/${gameState.player.maxHp}`;
            document.getElementById('player-energy-bar').style.width = (gameState.player.energy * 10) + "%";
            document.getElementById('player-energy-text').innerText = gameState.player.energy;

            document.getElementById('enemy-hp-bar').style.width = (gameState.enemy.hp / gameState.enemy.maxHp * 100) + "%";
            document.getElementById('enemy-hp-text').innerText = `${Math.ceil(gameState.enemy.hp)}/${gameState.enemy.maxHp}`;
            document.getElementById('enemy-energy-bar').style.width = (gameState.enemy.energy * 10) + "%";
            document.getElementById('enemy-energy-text').innerText = gameState.enemy.energy;

            // Habilitar/Desabilitar cartas por custo
            const cards = document.querySelectorAll('.card');
            cards.forEach((cardEl, idx) => {
                const cardData = gameState.player.hand[idx];
                if(cardData && cardData.cost > gameState.player.energy) {
                    cardEl.classList.add('disabled');
                } else {
                    cardEl.classList.remove('disabled');
                }
            });
        }

        function renderHand() {
            const handEl = document.getElementById('player-hand');
            handEl.innerHTML = '';
            
            gameState.player.hand.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.onclick = () => playCard(index);
                
                cardDiv.innerHTML = `
                    <div class="card-cost">${card.cost}</div>
                    <div class="card-header">
                        <div class="card-name">${card.name}</div>
                    </div>
                    <div class="card-body">
                        <div class="stat-item">${ICONS.power} Força: ${card.pwr}</div>
                        <div class="stat-item">${ICONS.health} Vida: ${card.hp}</div>
                        <div class="stat-item">${ICONS.attack} Atk: ${card.atk}</div>
                        <div class="stat-item">${ICONS.defense} Def: ${card.def}</div>
                    </div>
                `;
                handEl.appendChild(cardDiv);
            });
            updateUI();
        }

        function playCard(index) {
            const card = gameState.player.hand[index];
            if(!gameState.isPlaying || gameState.player.energy < card.cost) return;

            // Consome energia
            gameState.player.energy -= card.cost;
            
            // Calcula dano (Simples: Atk + Power - uma fração da Def inimiga básica)
            // No nosso jogo simplificado, a carta ataca diretamente os pontos de vida
            const damage = calculateDamage(card);
            applyDamage('enemy', damage);
            
            // Feedback Visual
            showFeedback(`-${damage}`, 'enemy');

            // Substitui carta
            gameState.player.hand[index] = getRandomCard();
            renderHand();
        }

        function calculateDamage(card) {
            // Fórmula: (Ataque * 1.2) + (Poder * 2) - (Defesa / 10)
            return Math.max(2, Math.floor((card.atk * 1.1) + (card.pwr * 1.5)));
        }

        function applyDamage(target, amount) {
            if(target === 'enemy') {
                gameState.enemy.hp -= amount;
                if(gameState.enemy.hp <= 0) {
                    gameState.enemy.hp = 0;
                    endGame("VITÓRIA!");
                }
            } else {
                gameState.player.hp -= amount;
                if(gameState.player.hp <= 0) {
                    gameState.player.hp = 0;
                    endGame("DERROTA...");
                }
            }
            updateUI();
        }

        function showFeedback(text, target) {
            const feed = document.getElementById('game-feed');
            const popup = document.createElement('div');
            popup.className = 'damage-popup';
            popup.innerText = text;
            
            if(target === 'player') {
                popup.style.color = '#ef4444';
                popup.style.marginTop = '100px';
            } else {
                popup.style.color = '#fbbf24';
                popup.style.marginTop = '-100px';
            }

            feed.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function checkEnemyAI() {
            if(!gameState.isPlaying) return;

            // IA decide jogar se tiver energia
            // Ela olha o deck e tenta jogar a carta que ela "tem" no momento (simulada)
            const availableCards = DECK.filter(c => c.cost <= gameState.enemy.energy);
            
            if(availableCards.length > 0 && Math.random() > 0.6) {
                const card = availableCards[Math.floor(Math.random() * availableCards.length)];
                
                gameState.enemy.energy -= card.cost;
                document.getElementById('enemy-action').innerText = `Jogou: ${card.name}!`;
                
                const damage = calculateDamage(card);
                
                // Animação inimiga
                const enemyHud = document.querySelector('.enemy-hud');
                enemyHud.classList.add('enemy-play');
                setTimeout(() => enemyHud.classList.remove('enemy-play'), 600);

                applyDamage('player', damage);
                showFeedback(`-${damage}`, 'player');
                
                setTimeout(() => {
                    document.getElementById('enemy-action').innerText = `Aguardando...`;
                }, 2000);
            }
        }

        function endGame(title) {
            gameState.isPlaying = false;
            document.getElementById('over-title').innerText = title;
            document.getElementById('screen-over').classList.remove('hidden');
        }

    </script>
</body>
</html>
